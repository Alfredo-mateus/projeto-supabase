name: Deploy Supabase
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
      - name: Link Supabase
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
      - name: Push migrations
        run: supabase db push
